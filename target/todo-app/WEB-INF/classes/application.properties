# ─────────────────────────────────────────────────────────────
# DevOps Project 1 - Application Configuration
# ─────────────────────────────────────────────────────────────

spring.application.name=DevOps Todo App
app.version=1.0.0

# ─── Server ──────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/todo-app

# ─── H2 In-Memory Database ───────────────────────────────────
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (accessible at /todo-app/h2-console during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ─── Data Initialisation ─────────────────────────────────────
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=DevOps Project 1 - Todo Application
info.app.version=1.0.0
info.app.description=Real-world Java web application for DevOps engineers

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.devops=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


